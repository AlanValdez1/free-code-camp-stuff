<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <link rel="stylesheet" href="lab_blog_post_card.css">
</head>
<body>
    <div class="blog-post-card">
        <img alt="idk man" class="post-img" src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg">
        <div class="post-content">
            <h2 class="post-title">Post title</h2>
            <p class="post-excerpt">This is text is just like a summary of the content.</p>
            <a class="read-more">Read More</a>
        </div>
    </div>
</body>
</html>
