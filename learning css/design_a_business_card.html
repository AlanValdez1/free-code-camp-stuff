<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Business Card</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <link rel="stylesheet" href="design_a_business_card.css">
</head>

<body>
    <div class="business-card">
        <img class="profile-image" src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg" alt="pink flower">
        <p class="full-name">your name</p>
        <p class="designation">designation</p>
        <p class="company">company name</p>
        <hr>
        <p>email address</p>
        <p>phone number</p>
        <a class="portfolio-link" href="google.com">Portfolio</a>
        <hr>
        <div class="social-media">
            <h2>Connect with me</h2>
            <a href="twitter.com">Twitter</a>
            <a href="linkedin.com">LinkedIn</a>
            <a href="github.com">GitHub</a>
        </div>
    </div>
</body>

</html>
