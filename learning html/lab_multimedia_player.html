<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multimedia Player</title>
</head>

<body>
  <h1>Main Title</h1>
  <section>
    <h2>Song Title</h2>
    <audio controls aria-label="digital music">
      <source src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3" type="mp3">
    </audio>
  </section>
  <section>
    <h2>Video Title</h2>
    <video controls width="360" aria-label="">
      <source src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4" type="mp4">
      <track src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.vtt" kind="transcript"
      srclang="eng" label="english">
    </video>
  </section>
  <section>
    <h2>Transcript</h2>
    <p>transcript</p>
  </section>
</body>

</html>
